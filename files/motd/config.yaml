# motd config template. Rendered to /etc/motd.yaml by modules/motd.nix, which
# fills in the animal field per host from the `motd.animal` option.
#
# `mark` — the friendly animal on the left. Pick any name from the marks dir,
# or remove the line entirely to drop the mark.
mark: { animal: @animal@}

layout:
  vstack:
    - hstack:
        - mark
        - vstack: [host, up, load, disk, mem, ip]
    - vstack: [services, updates]

modules:
  host: { builtin: hostname }
  up:   { builtin: uptime }
  load: { builtin: load }
  mem:  { builtin: mem }
  ip:   { builtin: ip }
  disk: { builtin: disk }

  # Reachability checks. Anything in `list` becomes one health check; only
  # the ones that fail show up in the rendered motd.
  services:
    builtin: services
    list:
      - { name: internet, http: "https://www.google.com/generate_204" }

  # Pending package updates. Empty stdout = silent; any output renders as a
  # warning. Adjust for your package manager (this snippet handles apt/dnf/
  # pacman/brew; pick the one for your OS or write your own).
  updates:
    command: |
      if command -v apt >/dev/null 2>&1; then
        n=$(apt list --upgradable 2>/dev/null | tail -n +2 | wc -l)
      elif command -v dnf >/dev/null 2>&1; then
        n=$(dnf -q check-update 2>/dev/null | grep -c '^[a-zA-Z0-9]')
      elif command -v checkupdates >/dev/null 2>&1; then
        n=$(checkupdates 2>/dev/null | wc -l)
      elif command -v brew >/dev/null 2>&1; then
        n=$(brew outdated 2>/dev/null | wc -l)
      else
        n=0
      fi
      [ "$n" -gt 0 ] && echo "$n packages outdated"
    cache: 1h
