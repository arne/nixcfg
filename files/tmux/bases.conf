# bases — dark tmux theme
# Source from ~/.config/tmux/tmux.conf:
#   source-file /path/to/bases.conf

# ── Status bar ────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-style "bg=#1a1815,fg=#857e75"
set -g status-interval 5

# Left: session name
set -g status-left-length 32
set -g status-left "#[bg=#4a9f82,fg=#141210,bold] #S #[default] "

# Right: time + date
set -g status-right-length 48
set -g status-right "#[fg=#4a9f82] %H:%M  #[fg=#e07800]%d %b %Y "

# ── Windows ───────────────────────────────────────────
set -g window-status-separator ""
set -g window-status-format \
  "#[fg=#4a4640,bg=#1a1815] #I #[fg=#857e75]#W "
set -g window-status-current-format \
  "#[bg=#201e1a,fg=#4a9f82,bold] #I #[fg=#ede8de]#W "

set -g window-status-activity-style "fg=#e07800"
set -g window-status-bell-style     "fg=#d95050,bold"

# ── Pane borders ─────────────────────────────────────
set -g pane-border-style        "fg=#2c2924"
set -g pane-active-border-style "fg=#4a9f82,bg=#1a1815"

# Pane number overlay (prefix q)
set -g display-panes-colour        "#857e75"
set -g display-panes-active-colour "#4a9f82"

# ── Command / message line ────────────────────────────
set -g message-style         "bg=#201e1a,fg=#ede8de"
set -g message-command-style "bg=#201e1a,fg=#ede8de"

# Command prompt prefixes: a labeled colour block instead of tmux's
# default '(action) ' style. Amber for the free-form command prompt,
# blue for context-specific value prompts (rename / move / go / find /
# keys). Each prompt is stored in a user option so adding a new one is
# one line: `set -g @prompt-foo "...#[bg=COLOR]... foo ..."`.
# Note: command-prompt -p does NOT accept comma-combined attributes
# in a single #[...] block, so each attr is its own block.
set -g @prompt-cmd    "#[fg=#141210]#[bg=#e07800]#[bold] cmd #[default] "
set -g @prompt-rename "#[fg=#141210]#[bg=#5a8fcc]#[bold] rename #[default] "
set -g @prompt-move   "#[fg=#141210]#[bg=#5a8fcc]#[bold] move #[default] "
set -g @prompt-go     "#[fg=#141210]#[bg=#5a8fcc]#[bold] go #[default] "
set -g @prompt-find   "#[fg=#141210]#[bg=#5a8fcc]#[bold] find #[default] "
set -g @prompt-keys   "#[fg=#141210]#[bg=#5a8fcc]#[bold] keys #[default] "

bind  :  command-prompt -p "#{@prompt-cmd}"
bind '$' command-prompt -p "#{@prompt-rename}" -I "#S" { rename-session "%%" }
bind  ,  command-prompt -p "#{@prompt-rename}" -I "#W" { rename-window "%%" }
bind  .  command-prompt -p "#{@prompt-move}" -T target { move-window -t "%%" }
bind "'" command-prompt -p "#{@prompt-go}" -T window-target { select-window -t ":%%" }
bind  /  command-prompt -p "#{@prompt-keys}" -k { list-keys -1N "%%" }
bind  f  command-prompt -p "#{@prompt-find}" { find-window -Z "%%" }

# ── Mode indicator (copy mode, etc.) ─────────────────
set -g mode-style "bg=#3a3630,fg=#ede8de"

# Copy-mode search highlights
set -g copy-mode-match-style         "bg=#3a3630,fg=#e07800"
set -g copy-mode-current-match-style "bg=#e07800,fg=#141210,bold"
set -g copy-mode-mark-style          "bg=#5a8fcc,fg=#141210"

# ── Menus & popups ───────────────────────────────────
set -g menu-style          "bg=#201e1a,fg=#ede8de"
set -g menu-selected-style "bg=#4a9f82,fg=#141210,bold"
set -g menu-border-style   "fg=#3a3630"

set -g popup-style        "bg=#201e1a,fg=#ede8de"
set -g popup-border-style "fg=#3a3630"

# ── Clock ─────────────────────────────────────────────
set -g clock-mode-colour "#4a9f82"
