# bases-light — light tmux theme
# Source from ~/.config/tmux/tmux.conf:
#   source-file /path/to/bases-light.conf

# ── Status bar ────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-style "bg=#fdfcf8,fg=#7c7469"
set -g status-interval 5

# Left: session name
set -g status-left-length 32
set -g status-left "#[bg=#2a5f4f,fg=#ffffff,bold] #S #[default] "

# Right: time + date
set -g status-right-length 48
set -g status-right "#[fg=#2a5f4f] %H:%M  #[fg=#b35800]%d %b %Y "

# ── Windows ───────────────────────────────────────────
set -g window-status-separator ""
set -g window-status-format \
  "#[fg=#bab5aa,bg=#fdfcf8] #I #[fg=#7c7469]#W "
set -g window-status-current-format \
  "#[bg=#f7f4ee,fg=#2a5f4f,bold] #I #[fg=#1a1814]#W "

set -g window-status-activity-style "fg=#b35800"
set -g window-status-bell-style     "fg=#c12b2b,bold"

# ── Pane borders ─────────────────────────────────────
set -g pane-border-style        "fg=#dbd6cc"
set -g pane-active-border-style "fg=#2a5f4f,bg=#fdfcf8"

# Pane number overlay (prefix q)
set -g display-panes-colour        "#7c7469"
set -g display-panes-active-colour "#2a5f4f"

# ── Command / message line ────────────────────────────
set -g message-style         "bg=#f7f4ee,fg=#1a1814"
set -g message-command-style "bg=#f7f4ee,fg=#1a1814"

# Command prompt prefixes: a labeled colour block instead of tmux's
# default '(action) ' style. Amber for the free-form command prompt,
# blue for context-specific value prompts (rename / move / go / find /
# keys). Each prompt is stored in a user option so adding a new one is
# one line: `set -g @prompt-foo "...#[bg=COLOR]... foo ..."`.
# Note: command-prompt -p does NOT accept comma-combined attributes
# in a single #[...] block, so each attr is its own block.
set -g @prompt-cmd    "#[fg=#1a1814]#[bg=#b35800]#[bold] cmd #[default] "
set -g @prompt-rename "#[fg=#ffffff]#[bg=#1e5799]#[bold] rename #[default] "
set -g @prompt-move   "#[fg=#ffffff]#[bg=#1e5799]#[bold] move #[default] "
set -g @prompt-go     "#[fg=#ffffff]#[bg=#1e5799]#[bold] go #[default] "
set -g @prompt-find   "#[fg=#ffffff]#[bg=#1e5799]#[bold] find #[default] "
set -g @prompt-keys   "#[fg=#ffffff]#[bg=#1e5799]#[bold] keys #[default] "

bind  :  command-prompt -p "#{@prompt-cmd}"
bind '$' command-prompt -p "#{@prompt-rename}" -I "#S" { rename-session "%%" }
bind  ,  command-prompt -p "#{@prompt-rename}" -I "#W" { rename-window "%%" }
bind  .  command-prompt -p "#{@prompt-move}" -T target { move-window -t "%%" }
bind "'" command-prompt -p "#{@prompt-go}" -T window-target { select-window -t ":%%" }
bind  /  command-prompt -p "#{@prompt-keys}" -k { list-keys -1N "%%" }
bind  f  command-prompt -p "#{@prompt-find}" { find-window -Z "%%" }

# ── Mode indicator (copy mode, etc.) ─────────────────
set -g mode-style "bg=#c4bfb3,fg=#1a1814"

# Copy-mode search highlights
set -g copy-mode-match-style         "bg=#c4bfb3,fg=#b35800"
set -g copy-mode-current-match-style "bg=#b35800,fg=#1a1814,bold"
set -g copy-mode-mark-style          "bg=#1e5799,fg=#ffffff"

# ── Menus & popups ───────────────────────────────────
set -g menu-style          "bg=#f7f4ee,fg=#1a1814"
set -g menu-selected-style "bg=#2a5f4f,fg=#ffffff,bold"
set -g menu-border-style   "fg=#c4bfb3"

set -g popup-style        "bg=#f7f4ee,fg=#1a1814"
set -g popup-border-style "fg=#c4bfb3"

# ── Clock ─────────────────────────────────────────────
set -g clock-mode-colour "#2a5f4f"
